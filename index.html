<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>copaWEB - GML'S</title>

    <link rel="stylesheet" href="frontend/css/style.css">
    <script src="frontend/js/busca.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="frontend/js/tema.js"></script>
</head>
<body>
    

    <header>
        
        <div class="logo">
        <span class="profile-icon"></span>
        copaWEB
        
    </div>

    <button id="btn-tema" style="position: absolute; right: 180px; top: 15px; background: transparent; border: none; color: var(--texto-principal); font-size: 1.2rem; cursor: pointer; padding: 6px; z-index: 1000; transition: var(--transicao);">
        <i class="fa-solid fa-moon"></i>
    </button>
            
<div class="search-container" style="position: absolute; right: 20px; top: 15px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 6px 12px; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 1000;">
    <input type="text" id="campo-pesquisa" placeholder="Pesquisar..." style="background: transparent; border: none; color: #fff; outline: none; width: 120px; font-size: 0.85rem;">
    <i class="fa-solid fa-magnifying-glass" style="color: rgba(255, 255, 255, 0.6); font-size: 0.9rem; cursor: pointer;"></i>
</div>



</div>
    </header>

    <div class="container-banner-imagem">
    <img src="frontend/assets/imagens/estadio1.png" alt="Banner Copa do Mundo" class="banner-imagem-wide">
</div>
<section class="info-copa-section">
    <div class="info-copa-grid">
        
        <div class="info-card">
            <span class="info-card-icon"><i class="fa-solid fa-trophy"></i></span>
            <span class="info-card-label">Campeão da edição</span>
            <span class="info-card-value">Argentina</span>
        </div>

        <div class="info-card">
            <span class="info-card-icon"><i class="fa-solid fa-ring"></i></span>
            <span class="info-card-label">Jogos</span>
            <span class="info-card-value">64</span>
        </div>

        <div class="info-card">
            <span class="info-card-icon"><i class="fa-regular fa-futbol"></i></span>
            <span class="info-card-label">Total de gols na copa</span>
            <span class="info-card-value">172</span>
        </div>

        <div class="info-card">
            <span class="info-card-icon"><i class="fa-solid fa-people-group"></i></span>
            <span class="info-card-label">Seleções</span>
            <span class="info-card-value">32</span>
        </div>

    </div>
</section>

    <div class="pagina-inicio">
        <section class="secao-destaque">
            <h2 class="section-header">A Grande Final</h2>
            <div id="jogo-destaque" class="destaque-wrapper">
                <p class="mensagem-vazia">Carregando partida...</p>
            </div>
        </section>

        <section>
            <h2 class="section-header">Resultados por Fase</h2>
            <div id="lista-jogos" class="jogos-grid">
                <p class="mensagem-vazia">Carregando partidas...</p>
            </div>
        </section>
    </div>

<div class="bottom-nav">
    <a href="index.html" class="nav-item active">
        <i class="fa-solid fa-house-chimney" style="font-size: 1.2rem;"></i>
        Início
    </a>
    <a href="frontend/tabela.html" class="nav-item">
        <i class="fa-solid fa-table-list" style="font-size: 1.2rem;"></i>
        Tabela
    </a>
    <a href="frontend/artilheiros.html" class="nav-item">
        <i class="fa-solid fa-ranking-star" style="font-size: 1.2rem;"></i>
        Artilheiros
    </a>
    <a href="frontend/selecoes.html" class="nav-item">
        <i class="fa-solid fa-flag" style="font-size: 1.2rem;"></i>
        Seleções
    </a>
</div>

    <script src="frontend/js/api.js"></script>
    <script src="frontend/js/home.js"></script>
</body>
</html>
