<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Seleção</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="./js/perfilselecao.js"></script>
    <script src="js/tema.js"></script>

</head>

<body>

<header>

    <div style="display:flex; align-items:center; gap:14px;">

        <a href="selecoes.html" class="back-icon">←</a>

        <div class="logo">
        <span class="profile-icon"></span>
        copaWEB
    </div>

    <button id="btn-tema" style="position: absolute; right: 180px; top: 15px; background: transparent; border: none; color: var(--texto-principal); font-size: 1.2rem; cursor: pointer; padding: 6px; z-index: 1000; transition: var(--transicao);">
        <i class="fa-solid fa-moon"></i>
    </button>
        </div>

    </div>

</header>

<main class="container-simples">

    <div class="perfil-card">

        <img id="escudo">

        <h1 id="nome"></h1>

        <p class="confederacao">
            Confederação:
            <span id="confederacao"></span>
        </p>

    </div>

    <div class="stats-panel">

        <h2 class="section-header">
            Informações Gerais
        </h2>

        <div class="info-row">
            <span>Fundada em</span>
            <strong id="fundacao"></strong>
        </div>

        <div class="info-row">
            <span>Sigla Oficial</span>
            <strong id="sigla"></strong>
        </div>

        <div class="info-row">
            <span>Títulos da Copa</span>
            <strong id="titulos"></strong>
        </div>

        <div class="info-row">
            <span>Ranking FIFA</span>
            <strong id="ranking"></strong>
        </div>

    </div>

</main>

<script src="../js/perfilselecao.js"></script>

</body>

</html>
