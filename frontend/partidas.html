<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Partida — copaWEB</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="js/tema.js"></script>
</head>
<body>

    <header>
          <div style="display:flex; align-items:center; gap:14px;">

        <a href="javascript:history.back()" class="back-icon">←</a>
        <div class="logo">
        <span class="profile-icon"></span>
        copaWEB
    </div>

    <button id="btn-tema" style="position: absolute; right: 180px; top: 15px; background: transparent; border: none; color: var(--texto-principal); font-size: 1.2rem; cursor: pointer; padding: 6px; z-index: 1000; transition: var(--transicao);">
        <i class="fa-solid fa-moon"></i>
    </button>
        </div>
    </header>

    <div class="pagina-partida" style="padding-top: 20px;">

        <div id="partida-placar">
            <p class="mensagem-vazia">Carregando partida...</p>
        </div>

        <section>
            <h2 class="section-header">Estatísticas</h2>
            <div class="stats-panel">
                <div id="partida-estatisticas">
                    <p class="mensagem-vazia">Carregando estatísticas...</p>
                </div>
            </div>
        </section>

        <section>
            <h2 class="section-header">Melhores em Campo</h2>
            <div class="stats-panel">
                <div id="partida-destaques">
                    <p class="mensagem-vazia">Carregando destaques...</p>
                </div>
            </div>
        </section>

        <section>
            <h2 class="section-header">Linha do Tempo</h2>
            <div class="stats-panel">
                <div id="partida-eventos">
                    <p class="mensagem-vazia">Carregando events...</p>
                </div>
            </div>
        </section>

        <section>
            <h2 class="section-header">Escalações</h2>
            <div id="partida-escalacoes">
                <p class="mensagem-vazia">Carregando escalações...</p>
            </div>
        </section>

    </div>

    <div class="bottom-nav">
        <a href="../index.html" class="nav-item active">
            <i class="fa-solid fa-house-chimney" style="font-size: 1.2rem;"></i>
            Início
        </a>
        <a href="tabela.html" class="nav-item">
            <i class="fa-solid fa-table-list" style="font-size: 1.2rem;"></i>
            Tabela
        </a>
        <a href="artilheiros.html" class="nav-item">
            <i class="fa-solid fa-ranking-star" style="font-size: 1.2rem;"></i>
            Artilheiros
        </a>
        <a href="selecoes.html" class="nav-item">
            <i class="fa-solid fa-flag" style="font-size: 1.2rem;"></i>
            Seleções
        </a>
    </div>

    <script src="js/api.js"></script>
    <script src="js/partidas.js"></script>
</body>
</html>
