<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogos do Grupo — copaWEB</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="js/tema.js"></script>
</head>
<body>

    <header style="display: flex; align-items: center; justify-content: flex-start; height: 60px; padding: 0 20px; position: relative;">
    <div style="display: flex; align-items: center; gap: 15px;">
        <a href="tabela.html" style="color: var(--texto-principal); font-size: 1.25rem; display: flex; align-items: center; text-decoration: none; transition: var(--transicao); z-index: 1001;">
            <i class="fa-solid fa-chevron-left"></i>
        </a>

        <div class="logo" style="font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; margin: 0;">
            <span class="profile-icon"></span>
            copaWEB
        </div>
    </div>
    
    <button id="btn-tema" style="position: absolute; right: 180px; background: transparent; border: none; color: var(--texto-principal); font-size: 1.2rem; cursor: pointer; padding: 6px; z-index: 1000; transition: var(--transicao);">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="search-container" style="position: absolute; right: 20px; display: flex; align-items: center; background: rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 6px 12px; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 1000;">
        <input type="text" id="campo-pesquisa" placeholder="Pesquisar..." style="background: transparent; border: none; color: var(--texto-principal); outline: none; width: 120px; font-size: 0.85rem;">
        <i class="fa-solid fa-magnifying-glass" style="color: var(--texto-secundario); font-size: 0.9rem; cursor: pointer;"></i>
    </div>
</header>

    <div class="container-simples" style="padding-top: 20px;">
        <h2 class="section-header" id="titulo-grupo">Jogos do Grupo</h2>
        
        <div id="container-jogos">
            <p class="mensagem-vazia">Carregando partidas...</p>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house-chimney" style="font-size: 1.2rem;"></i>
            Início
        </a>
        <a href="tabela.html" class="nav-item active">
            <i class="fa-solid fa-table-list" style="font-size: 1.2rem;"></i>
            Tabela
        </a>
        <a href="artilheiros.html" class="nav-item">
            <i class="fa-solid fa-soccer-ball" style="font-size: 1.2rem;"></i>
            Artilheiros
        </a>
        <a href="selecoes.html" class="nav-item">
            <i class="fa-solid fa-flag" style="font-size: 1.2rem;"></i>
            Seleções
        </a>
    </div>

    <script src="js/api.js"></script>
    <script src="js/jogosgrupo.js"></script>
</body>
</html>
