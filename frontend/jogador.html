<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil do Jogador — copaWEB</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/tema.js"></script>

</head>
<body>

    <header>
        <div class="logo">
        <span class="profile-icon"></span>
        copaWEB
    </div>

    <button id="btn-tema" style="position: absolute; right: 180px; top: 15px; background: transparent; border: none; color: var(--texto-principal); font-size: 1.2rem; cursor: pointer; padding: 6px; z-index: 1000; transition: var(--transicao);">
        <i class="fa-solid fa-moon"></i>
    </button>
        </div>
    </header>

    <div class="pagina-partida" style="padding-top: 20px;">
        <div id="jogador-cabecalho">
            <p class="mensagem-vazia">Carregando perfil...</p>
        </div>

        <section>
            <h2 class="section-header">Estatísticas na Copa</h2>
            <div class="stats-panel">
                <div id="jogador-estatisticas">
                    <p class="mensagem-vazia">Carregando estatísticas...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/jogador.js"></script>
</body>
</html>
